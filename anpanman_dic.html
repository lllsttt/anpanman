    <script>
      (function() {

            var scrollerEl = embedEl && embedEl.closest('.editor-fullscreen-scroller');
            var scrollerRef = scrollerEl ? { current: scrollerEl } : undefined;
            var data = {"video":{"src":"https:\u002F\u002Flab-storytelling-storage.twreporter.org\u002Ffiles\u002F----------------------------------------------------------------------2-eqjPrXLyuP0j.mp4","mobileSrc":"","duration":63.5},"captions":[{"id":"moqcb","width":"narrow","alignment":"center","startTime":4.8,"rawContentState":{"blocks":[{"key":"elvgf","data":{},"text":"2022年2月24日，當俄羅斯戰車駛入烏克蘭領土，遠在八千公里外的台灣，也透過媒體即時收到大量戰事相關消息。這場第二次世界大戰結束以來歐洲最大規模的軍事衝突，至今已推進到第四個年頭。","type":"unstyled","depth":0,"entityRanges":[],"inlineStyleRanges":[]}],"entityMap":{}}},{"id":"afcnf","width":"narrow","alignment":"center","startTime":5.8,"rawContentState":{"blocks":[{"key":"1kbdv","data":{},"text":"而台灣人看這場戰爭，除了同情烏克蘭的遭遇，也憂心同樣面對著強鄰威脅的自己。「今日烏克蘭，明日台灣」的口號於是在台灣傳播開來，促使台灣人反思自身需要加強防衛抵抗境外勢力入侵台灣的決心。","type":"unstyled","depth":0,"entityRanges":[],"inlineStyleRanges":[{"style":"BOLD","length":12,"offset":37},{"style":"FONT_COLOR_#FFBD59","length":12,"offset":37}]}],"entityMap":{}}},{"id":"kekqq","width":"narrow","alignment":"center","startTime":6.8,"rawContentState":{"blocks":[{"key":"df0g2","data":{},"text":"報導蒐集台灣四家媒體——國家通訊社中央社、公共電視公視、前兩大電視媒體三立及TVBS——在過去四年間（2022-2026）所有提及「台灣」的烏俄戰爭報導。透過分析報導內容，看台灣媒體如何透過萬里戰火，照見自身的國防安全、外交身分，以及國內撕裂的安全戰略路線。","type":"unstyled","depth":0,"entityRanges":[],"inlineStyleRanges":[]}],"entityMap":{}}},{"id":"moiba","width":"wide","alignment":"center","startTime":11.5,"rawContentState":{"blocks":[{"key":"6m2hl","data":{},"text":"瀏覽近四年（2022-2026）來的國際新聞，你可能對背景的語句感到似曾相識。「普丁對烏克蘭做的事，可能就是習近平將對台灣做的事。」「如果俄羅斯攻打烏克蘭是幾天內結束，那中國打台灣要幾天？」「中國亦步亦趨地學習俄羅斯的手法……烏克蘭與台灣處境相似。」這些報導內容將八千公里外的砲火，生硬地與台海兩岸的緊張局勢劃上等號。當我們抱著警戒與焦慮的心情瀏覽完這上百篇的新聞，除了萌生 俄羅斯 = 中國、 烏克蘭 = 台灣 的思緒外，我們真的能從烏俄戰事中看出台灣值得學習之處嗎？","type":"unstyled","depth":0,"entityRanges":[],"inlineStyleRanges":[{"style":"FONT_COLOR_#BF1E12","length":1,"offset":187},{"style":"BOLD","length":8,"offset":188},{"style":"BOLD","length":9,"offset":197},{"style":"FONT_COLOR_#FFBD59","length":18,"offset":188}]}],"entityMap":{}}},{"id":"klidl","width":"wide","alignment":"center","startTime":12.5,"rawContentState":{"blocks":[{"key":"e5197","data":{},"text":"媒體作為傳遞資訊的角色，要如何把烏克蘭的實戰經驗，轉化為台灣在國防安全的參考？Ａ報導今天說烏克蘭靠無人機扭轉劣勢，台灣得趕緊精進軍事科技；Ｂ報導隔天稱武器是其次，烏克蘭人的抗敵意志才是關鍵；到了Ｃ報導，又變成政壇間討論教召制度與兵役延長的口水之戰。 ","type":"unstyled","depth":0,"entityRanges":[],"inlineStyleRanges":[]},{"key":"4aomt","data":{},"text":"這些「借鏡」七零八落，散落在各家媒體的報導中。所以此專題藉由烏俄戰爭討論台灣國防與民防安全的報導，從四大面向搜集了13個熱門話題。","type":"unstyled","depth":0,"entityRanges":[],"inlineStyleRanges":[]}],"entityMap":{}}},{"id":"kekkl","width":"narrow","alignment":"left","startTime":14,"rawContentState":{"blocks":[{"key":"322og","data":{},"text":"首先可以看出，媒體不純然是中立地借鏡這場戰事來強化自己的國防、民防，超過五成（54%）的新聞直接將中共設定為假想敵，帶著抗中意識在轉譯這場遠方戰火。","type":"unstyled","depth":0,"entityRanges":[],"inlineStyleRanges":[{"style":"BOLD","length":23,"offset":34},{"style":"FONT_COLOR_#FFBD59","length":23,"offset":34}]}],"entityMap":{}}},{"id":"hlffp","width":"narrow","alignment":"left","startTime":16.2,"rawContentState":{"blocks":[{"key":"3gsut","data":{},"text":"在民防安全方面，一項核心話題為「抗敵意志」。報導不斷藉烏克蘭平民對抗強鄰的論述，同時對國內社會進行精神動員。此外也有不少記者採訪到烏克蘭籍人士，以參與過戰火的人士提出實質建議，試圖解決民眾面對戰爭的恐慌。話題主要圍繞在全民國防相關實務，從烏俄戰事開戰初期，台灣民眾積極查詢「防空避難專區」、政府發放《全民國防手冊》、乃至志願軍與女性從軍的相關討論。到了後期，話題則延伸至如何引導民眾在戰時維持日常民生生活、防範境外敵意勢力的「認知作戰」，還引述烏克蘭專家建議，呼籲台灣應發展民防團體，並訓練民眾從小學習操作無人機。","type":"unstyled","depth":0,"entityRanges":[],"inlineStyleRanges":[]}],"entityMap":{}}},{"id":"kndfh","width":"wide","alignment":"center","startTime":23.24,"rawContentState":{"blocks":[{"key":"j5l","data":{},"text":"數據顯示，在四家媒體134篇聲援烏克蘭的報導中，超過六成在聲援烏克蘭的同時，會提及台灣同烏克蘭為「民主陣營的一員」、強調「國際需重視台海安全」、或指控「中俄是威脅聯盟」。","type":"unstyled","depth":0,"entityRanges":[],"inlineStyleRanges":[{"style":"FONT_COLOR_#FFBD59","length":4,"offset":24},{"style":"FONT_COLOR_#FFBD59","length":9,"offset":48},{"style":"FONT_COLOR_#FFBD59","length":11,"offset":60},{"style":"FONT_COLOR_#FFBD59","length":9,"offset":75},{"style":"BOLD","length":4,"offset":24},{"style":"BOLD","length":9,"offset":48},{"style":"BOLD","length":11,"offset":60},{"style":"BOLD","length":9,"offset":75}]},{"key":"e8hb6","data":{},"text":"在四年間的報導中，強調台灣與全球民主陣營同一陣線的報導共計44篇，其中超過半數（56.8%）來自台灣總統或政府部門的官方發言。在這些報導中，台灣官員頻繁使用「民主夥伴」、「理念相近國家」、與「價值同盟」等詞彙。而台灣民間也不斷強調自由、人權、和平等價值。透過這些報導，可以看見台灣透過烏俄戰事，點亮自己作為「民主燈塔」的身分標籤。","type":"unstyled","depth":0,"entityRanges":[],"inlineStyleRanges":[{"style":"BOLD","length":23,"offset":78},{"style":"BOLD","length":8,"offset":115}]}],"entityMap":{}}},{"id":"eoplk","width":"narrow","alignment":"center","startTime":27.43,"rawContentState":{"blocks":[{"key":"8tq4j","data":{},"text":"然而，在宣揚民主價值背後，台灣官方或民間也會將台灣實質、攸關生存的問題一起帶進烏俄戰事討論，將台海問題試圖國際化，或在報導中直指「中俄是全球的威權威脅」。","type":"unstyled","depth":0,"entityRanges":[],"inlineStyleRanges":[]}],"entityMap":{}}},{"id":"agdii","width":"wide","alignment":"center","startTime":34.29,"rawContentState":{"blocks":[{"key":"3bc8u","data":{},"text":"藉由烏俄戰爭，順理成章地抬高台灣在地緣政治中的戰略身分。無論官方聲明或民間發言，皆有意凸顯「俄烏戰事促成國際社會更加重視台灣價值及關注中國侵台意圖」、「台灣在印太區域活動能量儼然成為民主陣營對抗威權影響力的關鍵制衡因素之一」的內容。","type":"unstyled","depth":0,"entityRanges":[],"inlineStyleRanges":[{"style":"BOLD","length":71,"offset":45},{"style":"FONT_COLOR_#FFBD59","length":29,"offset":45},{"style":"FONT_COLOR_#FFBD59","length":37,"offset":75}]}],"entityMap":{}}},{"id":"gacie","width":"narrow","alignment":"left","startTime":39.06,"rawContentState":{"blocks":[{"key":"auntd","data":{},"text":"隨著烏俄戰事的演進，從台灣媒體的烏俄報導中也能看見不同的涉美與涉中言論。烏俄戰爭這面鏡子，也反映了台灣社會對於「國家如何實質生存」的思辨。在提及台灣的烏俄戰爭報導中，近四成（36.1%）會同時討論台美中三方的關係。","type":"unstyled","depth":0,"entityRanges":[],"inlineStyleRanges":[{"style":"BOLD","length":23,"offset":83},{"style":"FONT_COLOR_#FFBD59","length":23,"offset":83}]}],"entityMap":{}}},{"id":"kcidl","width":"narrow","alignment":"left","startTime":40.58,"rawContentState":{"blocks":[{"key":"fntft","data":{},"text":"烏俄戰爭一開打，美方隨即展現對烏克蘭的支持，提供軍武援助，但並無派兵直接與俄羅斯交戰。加上川普二次就任美國總統後，對烏援助發生變化。俄烏相關報導就台灣的「涉美關係」，也出現了「信任」與「懷疑」兩種論調。","type":"unstyled","depth":0,"entityRanges":[],"inlineStyleRanges":[]},{"key":"aa061","data":{},"text":"當這場國家的生存思辨延伸到如何面對中國時，資料透過媒體看見台灣社會對於抗中威脅的傾斜。超過八成的涉中報導（83.7%）皆聚焦於「如何針對中國備戰」，認為唯有增強實力才能確保實質和平，僅少數（16.3%）報導兩岸可以透過對話避免戰爭的相關內容","type":"unstyled","depth":0,"entityRanges":[],"inlineStyleRanges":[{"style":"BOLD","length":25,"offset":48},{"style":"FONT_COLOR_#FFBD59","length":25,"offset":48}]}],"entityMap":{}}},{"id":"faknq","width":"wide","alignment":"center","startTime":47.05,"rawContentState":{"blocks":[{"key":"8eu4e","data":{},"text":"在涉美的相關報導中，七成（72.1%）將台美劃為同盟。在報導中，可以看見信任的基礎正從口頭承諾走向實質。從早期美國總統拜登宣示「將協助台灣抵禦中國，就如同支持烏克蘭」，到副總統蕭美琴強調「台美必須從俄烏戰爭學到經驗、尋找領先方法」的防務深化、以及川普任內通過了史上最多的對台飛彈軍售，穩固台灣人對盟友的信心。","type":"unstyled","depth":0,"entityRanges":[],"inlineStyleRanges":[{"style":"BOLD","length":27,"offset":0},{"style":"BOLD","length":15,"offset":36},{"style":"FONT_COLOR_#FFBD59","length":27,"offset":0}]},{"key":"2fg33","data":{},"text":"然而，烏克蘭的艱困處境，也反應出另一種疑美思維。報導中直白地表示：「美國絕不會派軍隊介入他國戰爭，烏克蘭如是，未來台灣亦如是。」特別是隨著川普重返白宮，裁減對烏軍援、提出要求烏克蘭割地的和平協議後，疑美論再次甚囂塵上。","type":"unstyled","depth":0,"entityRanges":[],"inlineStyleRanges":[{"style":"BOLD","length":6,"offset":69},{"style":"BOLD","length":9,"offset":99},{"style":"FONT_COLOR_#FFBD59","length":6,"offset":69},{"style":"FONT_COLOR_#FFBD59","length":9,"offset":99}]}],"entityMap":{}}},{"id":"npnbc","width":"wide","alignment":"center","startTime":53.02,"rawContentState":{"blocks":[{"key":"95at7","data":{},"text":"媒體大量記錄了台灣社會「看到俄烏戰況後，對台海局勢產生更強烈緊張感」的集體心理。專家與官方以此為正當性，推動「強化抗中威脅」的具體舉措——包含役期延長、新制教召與積極提升不對稱戰力。報導在潛意識中向大眾示警：烏俄戰爭可能成為中共動武的實驗場。\n\n相較之下，主張兩岸對話、和平避戰的報導篇幅雖然較少（16.3%），卻代表了台灣社會另一種對於戰爭殘酷性的深刻反省。","type":"unstyled","depth":0,"entityRanges":[],"inlineStyleRanges":[{"style":"BOLD","length":16,"offset":104},{"style":"BOLD","length":12,"offset":167},{"style":"FONT_COLOR_#FFBD59","length":16,"offset":104},{"style":"FONT_COLOR_#FFBD59","length":12,"offset":167}]}],"entityMap":{}}},{"id":"qoodm","width":"wide","alignment":"center","startTime":60.5,"rawContentState":{"blocks":[{"key":"8lbmv","data":{},"text":"透過資料得知，台灣媒體與官方在這場戰火中，不僅僅只是扮演人道主義的旁觀者。在實質層面，我們正積極地將烏克蘭的不對稱戰術內化，催生了無人機國家隊、重啟一年期兵役，借鏡烏俄戰爭以強化我國國防與民防；在國際舞台上，我們也展現出積極聲援烏克蘭面貌，並全球民主陣營的角色為敲門磚，把台海安全放進國際重要議題中。然而，這面鏡子不仅照出了台灣對外的防禦盔甲，也生生照出了島嶼內部的戰略路線撕裂。當我們深究涉及美中的報導時，可以看見台灣人在面臨大國博弈與強鄰進逼時並未達成共識。","type":"unstyled","depth":0,"entityRanges":[],"inlineStyleRanges":[]},{"key":"e3jhn","data":{},"text":"「今日烏克蘭，明日台灣」不是預言，而是台灣人正在用遠方戰火告誡自己。四年過去了，烏克蘭的煙硝依舊，而台灣已經在這面無情的鏡子前，也看清了內部認同的拉鋸。遠方的戰火逼著這座島嶼在恐懼的煙硝背後，看清現實，思考屬於台灣人自己的生存答案。","type":"unstyled","depth":0,"entityRanges":[],"inlineStyleRanges":[]}],"entityMap":{}}},{"id":"oeada","width":"narrow","alignment":"left","startTime":15.2,"rawContentState":{"blocks":[{"key":"bpojm","data":{},"text":"在國防安全相關的報導，版面幾乎被「無人機與國防自主」佔據，這也催生了台灣「無人機國家隊」的跨部會建制，顯示在這場戰事的借鏡之下，台灣最希望立即提升無人機自造的能力。討論度次之的「兵役制度」，將烏克蘭的持久戰與台灣「義務役期恢復一年」的內容交織在一起。因應中共威脅，政府也喊出將把國防預算大幅拉高，並積極發展「不對稱戰力」，以彌補我國與中共的軍事實力差距。","type":"unstyled","depth":0,"entityRanges":[],"inlineStyleRanges":[]}],"entityMap":{}}},{"id":"hlpib","width":"narrow","alignment":"left","startTime":57.47,"rawContentState":{"blocks":[{"key":"89h6r","data":{},"text":"將這些涉美、涉中的戰略報導按「媒體來源」拆解時。作為台灣最受信任的公共媒體——公視反而在「台美同盟、抗中」的報導量上，高過其他媒體。而TVBS則相對其他媒體在「疑美論、兩岸對話」的避險論述上有更多篇幅。","type":"unstyled","depth":0,"entityRanges":[],"inlineStyleRanges":[]}],"entityMap":{}}}],"darkMode":true,"secondsPer100vh":1.5,"uuid":"7ab7b4e2-f509-4651-8945-c31a069b25c7"};
            data.scrollerRef = scrollerRef;
            window[namespace][pkg].push(data);
          }
        }
      })()
    </script>
